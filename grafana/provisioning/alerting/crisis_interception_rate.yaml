apiVersion: 1

groups:
  - orgId: 1
    name: vita-clinical
    folder: VITA Clinical
    interval: 5m
    rules:
      - uid: vita-crisis-interception-rate
        title: Crisis interception rate below 95%
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: vita-vmsingle
            model:
              editorMode: code
              expr: >-
                sum(increase(vita_crisis_intercepted_total[15m]))
                /
                sum(increase(vita_crisis_signals_total[15m]))
              instant: true
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: vita-vmsingle
            model:
              editorMode: code
              expr: sum(increase(vita_crisis_signals_total[15m]))
              instant: true
              range: false
              refId: B
          - refId: C
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: __expr__
            model:
              type: classic_conditions
              refId: C
              conditions:
                - evaluator:
                    params:
                      - 0.95
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
                - evaluator:
                    params:
                      - 5
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: Crisis interception rate dropped below 95% with sufficient signal volume
          description: >-
            Review crisis logs (log_type=crisis, event_type=crisis_interception)
            and clinical scenario tests. LogsQL alert:
            config/observability/crisis_interception_missed.logsql
        labels:
          severity: clinical
          component: emotional_safety_hub
