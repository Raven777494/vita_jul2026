# VictoriaMetrics scrape config for vita-api Prometheus metrics (P4-3).
# Mounted into vmsingle via docker-compose.yml (-promscrape.config).

global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: vita-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - vita-api:8080
