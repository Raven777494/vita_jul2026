# GitHub Actions CI for VITA (engine7b)
#
# Security rules (mandatory):
#   1. Only Verified Creator actions from the `actions` organization.
#   2. Pin major version tags (never @main / @master).
#   3. No secrets in workflow YAML — use GitHub Encrypted Secrets when deploy is added.
#
# Verified actions used:
#   - actions/checkout@v4
#   - actions/setup-python@v5
#
# Dependency scanning uses pip-audit via shell (scripts/security/pip_audit_check.py),
# not third-party Marketplace actions.

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  test-and-alignment:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Testing profile: non-production defaults come from app/config.py.
      # No secret literals here (see docs security rule 3; GitHub Encrypted
      # Secrets are used only by deploy.yml).
      CI: "true"
      GITHUB_ACTIONS: "true"
      ENV: "testing"
      VITA_USE_COMPOSE_CI: "1"
      DB_PLATFORM_ENGINE_REQUIRED: "false"
      ENABLE_VICTORIA_LOGS_SHIPPER: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-ci.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install -r requirements-dev.txt

      - name: Scan for accidental secrets in tracked files
        run: python scripts/security/scan_secrets.py

      - name: Verify requirements traceability matrix
        run: python scripts/governance/check_traceability.py

      - name: Run clinical language policy tests
        run: python -m pytest tests/clinical/ -q --tb=short

      - name: Run compose env loading tests
        env:
          VITA_USE_COMPOSE_CI: "1"
        run: python -m pytest tests/platform/test_compose_env.py -q --tb=short

      - name: Run crisis interception metrics tests
        run: python -m pytest tests/metrics/test_crisis_metrics.py -q --tb=short

      - name: Run governance traceability tests
        run: python -m pytest tests/governance/ -q --tb=short

      - name: Run system alignment checker
        run: python app/tests/system_alignment_checker.py

      - name: Validate docker compose configuration
        run: docker compose --env-file config/.env.compose.ci config --quiet

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements-audit.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Scan Python dependencies for known vulnerabilities
        run: python scripts/security/pip_audit_check.py
